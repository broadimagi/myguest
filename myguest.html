<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guest Check-In</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; font-family: 'Poppins', sans-serif; }

body {
  margin: 0;
  background: linear-gradient(135deg, #0f172a, #1e3a8a);
  color: white;
}

.top-bar {
  position: absolute;
  top: 20px;
  right: 20px;
}

.top-bar button {
  margin-left: 5px;
  padding: 8px 12px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

.btn-upload {
  background: linear-gradient(135deg, #3b82f6, #1e40af);
  color: white;
}

.btn-view {
  background: linear-gradient(135deg, #10b981, #047857);
  color: white;
}

.secondary { background: rgba(255,255,255,0.2); color: white; }

.container {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
  padding: 40px;
  border-radius: 20px;
  width: 350px;
  text-align: center;
}

input {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: none;
  margin-bottom: 10px;
}

button {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: none;
  margin-top: 5px;
  cursor: pointer;
}

.primary { background: #3b82f6; color: white; }

.popup {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
}

.popup-content {
  background:white;
  color:black;
  padding:25px;
  border-radius:12px;
  width:90%;
  max-width:900px;
  max-height:85vh;
  overflow:auto;
}

/* TOGGLE */
.toggle-row {
  display:flex;
  justify-content:space-between;
  margin:8px 0;
}

.switch {
  position: relative;
  width: 42px;
  height: 22px;
}

.switch input { display:none; }

.slider {
  position:absolute;
  inset:0;
  background:#ccc;
  border-radius:20px;
}

.slider:before {
  content:"";
  position:absolute;
  width:16px;height:16px;
  left:3px;top:3px;
  background:white;
  border-radius:50%;
  transition:.3s;
}

input:checked + .slider {
  background:#3b82f6;
}

input:checked + .slider:before {
  transform:translateX(18px);
}

/* DASHBOARD */
.dashboard {
  display:flex;
  gap:10px;
  margin-bottom:15px;
}

.card-stat {
  flex:1;
  background:#f1f5f9;
  padding:10px;
  border-radius:10px;
  text-align:center;
}
	
	.footer {
  position: fixed;
  bottom: 10px;
  width: 100%;
  text-align: center;
  font-size: 12px;
  color: rgba(255,255,255,0.7);
  letter-spacing: 0.5px;
}

.footer b {
  color: #3b82f6;
}

.card-stat.green { background:#d1fae5; }
.card-stat.orange { background:#fde68a; }

.stat-title { font-size:12px; color:#475569; }
.stat-value { font-size:20px; font-weight:bold; }

table { width:100%; border-collapse:collapse; }
td, th { padding:10px; border-bottom:1px solid #eee; }
.status-ok { color:green; }
.status-wait { color:orange; }

</style>
</head>

<body>

<div class="top-bar">
  <button onclick="openSettings()" class="secondary">Settings</button>
  <input type="file" id="csvFile" hidden onchange="loadCSV(event)">
  <button class="btn-upload" onclick="openFile()">Upload</button>
  <button class="btn-view" onclick="viewMasterlist()">Masterlist</button>
</div>

<div class="container">
  <div class="card">
    <h2>Guest Check-In</h2>

    <form onsubmit="event.preventDefault(); checkName();">
      <input type="text" id="nameInput">
      <button class="primary">Check</button>
    </form>

    <button class="secondary" onclick="resetForm()">Refresh</button>
  </div>
</div>

<div id="popup" class="popup" onclick="outside(event)">
  <div class="popup-content">
    <h3 id="title"></h3>
    <div id="content"></div>
    <div id="actions"></div>
  </div>
</div>

<script>

let masterlist = JSON.parse(localStorage.getItem("masterlist")) || [];

let settings = JSON.parse(localStorage.getItem("settings")) || {
  showColumns: [],
  confirmColumns: [],
  suggestionColumns: []
};

let current = null;
let currentIndex = null;

/* FILE */
function openFile(){document.getElementById("csvFile").click();}

/* UPLOAD */
function loadCSV(e){
  const reader=new FileReader();

  reader.onload=ev=>{
    const rows=ev.target.result.split("\n");
    const headers=rows[0].split(",").map(h=>h.trim());

    let added=0;

    rows.slice(1).forEach(r=>{
      if(!r.trim())return;

      let obj={};
      r.split(",").forEach((v,i)=>obj[headers[i]]=v.trim());
      obj.status=""; obj.time="";

      const exists = masterlist.some(x =>
        headers.every(h => x[h] === obj[h])
      );

      if(!exists){
        masterlist.push(obj);
        added++;
      }
    });

    if(!settings.showColumns.length){
      settings.showColumns=headers;
      settings.confirmColumns=headers;
      settings.suggestionColumns=headers;
    }

    localStorage.setItem("masterlist",JSON.stringify(masterlist));
    localStorage.setItem("settings",JSON.stringify(settings));

    showPopup("Upload Complete",`Added: ${added}`);
  };

  reader.readAsText(e.target.files[0]);
}

/* SETTINGS */
function openSettings(){
  const headers=Object.keys(masterlist[0]||{}).filter(x=>x!=="status"&&x!=="time");

  const makeToggle=(type)=>headers.map(h=>`
    <div class="toggle-row">
      <span>${h}</span>
      <label class="switch">
        <input type="checkbox"
        ${settings[type].includes(h)?"checked":""}
        onchange="toggleSetting('${type}','${h}')">
        <span class="slider"></span>
      </label>
    </div>`).join("");

  showPopup("Settings",
    `<b>Masterlist</b>${makeToggle("showColumns")}
     <hr><b>Confirmation</b>${makeToggle("confirmColumns")}
     <hr><b>Suggestions</b>${makeToggle("suggestionColumns")}`
  );
}

function toggleSetting(type,f){
  settings[type]=settings[type].includes(f)
  ?settings[type].filter(x=>x!==f)
  :[...settings[type],f];

  localStorage.setItem("settings",JSON.stringify(settings));
}

/* SEARCH */
function checkName(){
  const val=document.getElementById("nameInput").value.toLowerCase();

  const exact=masterlist.find(i=>Object.values(i).some(v=>v.toLowerCase()===val));
  if (exact){
    const index = masterlist.indexOf(exact);
    return selectSuggestion(index);
  }

  const sug=masterlist.filter(i=>Object.values(i).some(v=>v.toLowerCase().includes(val))).slice(0,5);

  if(!sug.length)return showPopup("Not Found","No match");

  let html = sug.map(i => {
    let index = masterlist.indexOf(i);

    let label = settings.suggestionColumns
      .map(c => i[c])
      .filter(Boolean)
      .join(" - ");

    return `<button onclick="selectSuggestion(${index})">${label}</button>`;
  }).join("");

  showPopup("Did you mean?",html);
}

/* SELECT */
function selectSuggestion(index){
  currentIndex = index;
  current = masterlist[index];

  if(current.status==="Checked"){
    return showPopup("Already Checked-in", current.time);
  }

  let content=settings.confirmColumns.map(c=>`<b>${c}:</b> ${current[c]}`).join("<br>");

  showPopup("Verified",content,
    `<button onclick="checkIn()">Confirm Check-In</button>`
  );
}

/* CHECK-IN */
function checkIn(){
  if (currentIndex === null) return;

  const time = new Date().toLocaleString();

  masterlist[currentIndex].status = "Checked";
  masterlist[currentIndex].time = time;

  localStorage.setItem("masterlist", JSON.stringify(masterlist));

  let content=settings.confirmColumns.map(c=>`<b>${c}:</b> ${masterlist[currentIndex][c]}`).join("<br>");

  showPopup("Checked-In Successfully", `
    ${content}
    <hr>
    <b>Status:</b> Checked<br>
    <b>Time:</b> ${time}
  `,
  `<button onclick="afterCheckIn()" style="background:#10b981;color:white;">Close</button>`
  );
}

/* AFTER */
function afterCheckIn(){
  closePopup();
  document.getElementById("nameInput").value="";
  document.getElementById("nameInput").focus();
}

/* MASTERLIST */
function viewMasterlist(){

  if (!masterlist.length) return showPopup("No Data","No uploaded data.");

  const total = masterlist.length;
  const checked = masterlist.filter(x => x.status === "Checked").length;
  const pending = total - checked;

  let headers = settings.showColumns.length
    ? settings.showColumns
    : Object.keys(masterlist[0]).filter(x => x !== "status" && x !== "time");

  let headerRow = headers.map(h => `<th>${h}</th>`).join("") + `<th>Status</th>`;

  let rows = masterlist.map(item => {
    let cols = headers.map(h => `<td>${item[h] || ""}</td>`).join("");

    let status = item.status === "Checked"
      ? `<span class="status-ok">Checked (${item.time})</span>`
      : `<span class="status-wait">Pending</span>`;

    return `<tr>${cols}<td>${status}</td></tr>`;
  }).join("");

  showPopup("Masterlist",`
    <div class="dashboard">
      <div class="card-stat"><div class="stat-title">Total</div><div class="stat-value">${total}</div></div>
      <div class="card-stat green"><div class="stat-title">Checked</div><div class="stat-value">${checked}</div></div>
      <div class="card-stat orange"><div class="stat-title">Pending</div><div class="stat-value">${pending}</div></div>
    </div>

    <table>
      <tr>${headerRow}</tr>
      ${rows}
    </table>

    <div style="margin-top:15px;text-align:center;">
      <button onclick="download()">Download</button>
    </div>

    <div style="margin-top:10px;text-align:center;">
      <button onclick="resetAll()" style="background:#7c3aed;color:white;">Clear All Status</button>
    </div>

    <div style="margin-top:10px;text-align:center;">
      <button onclick="clearAllData()" style="background:#ef4444;color:white;">Clear All Uploaded Data</button>
    </div>
  `);
}

/* DOWNLOAD */
function download() {
  let csv = Object.keys(masterlist[0]).join(",") + "\n";
  masterlist.forEach(item => {
    csv += Object.values(item).join(",") + "\n";
  });

  const blob = new Blob([csv]);
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "attendance.csv";
  a.click();
}

/* RESET */
function resetAll() {
  const pass = prompt("Enter admin password:");
  if (pass !== "Broadimagi") return showPopup("Denied", "Wrong password");

  masterlist.forEach(item => {
    item.status = "";
    item.time = "";
  });

  localStorage.setItem("masterlist", JSON.stringify(masterlist));
  showPopup("Reset Complete", "All statuses cleared.");
}

/* CLEAR ALL */
function clearAllData() {
  const pass = prompt("Enter admin password:");
  if (pass !== "Broadimagi") return showPopup("Denied", "Wrong password");

  if (!confirm("Download first?")) return;

  download();

  setTimeout(() => {
    if (!confirm("Delete ALL data?")) return;

    masterlist = [];
    localStorage.removeItem("masterlist");

    showPopup("Deleted", "All data removed.");
  }, 500);
}
document.addEventListener("keydown", function(e){

  // ENTER KEY
  if(e.key === "Enter"){

    // If popup is open
    const popupVisible = document.getElementById("popup").style.display === "flex";

    if(popupVisible){

      // If Confirm button exists → trigger it
      const confirmBtn = document.querySelector("#actions button");
      if(confirmBtn){
        e.preventDefault();
        confirmBtn.click();
      }

    }
  }

  // ESC KEY
  if(e.key === "Escape"){
    closePopup();
  }

});
/* UI */
function showPopup(t,c,a=""){
  document.getElementById("title").innerHTML=t;
  document.getElementById("content").innerHTML=c;
  document.getElementById("actions").innerHTML=a;
  document.getElementById("popup").style.display="flex";
}

function closePopup(){
  document.getElementById("popup").style.display="none";
}

function outside(e){
  if(e.target.id==="popup") closePopup();
}

function resetForm(){
  document.getElementById("nameInput").value="";
}

</script>
	<div class="footer">
  Powered by: <b>Broadimagi</b>
</div>

</body>
</html>
