<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>myGuest</title>
<link rel="icon" type="image/png" href="broadimagi.png">
<style>
* { box-sizing: border-box; font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
:root {
  --primary-color: #3b82f6;
  --bg-gradient: linear-gradient(135deg, #0f172a, #1e3a8a);
}
body {
  margin: 0;
  min-height: 100vh;
  transition: background 0.4s ease, color 0.3s ease;
  background: var(--bg-gradient);
  background-size: cover !important;
  background-position: center !important;
  background-repeat: no-repeat !important;
  background-attachment: fixed !important;
}
body.bg-dark-contrast { color: #ffffff; }
body.bg-light-contrast { color: #0f172a; }
.top-bar {
  position: absolute;
  top: 20px;
  left: 20px;
  right: 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 10;
}
.status-group {
  display: flex;
  align-items: center;
  gap: 15px;
}
.top-bar-buttons {
  display: flex;
  align-items: center;
  gap: 12px;
}
.top-bar button { padding: 10px 18px; border-radius: 8px; border: none; cursor: pointer; white-space: nowrap; font-size: 14px; font-weight: 500; }
.btn-view { background: linear-gradient(135deg, #10b981, #047857); color: white; }
body.bg-dark-contrast .secondary { background: rgba(255,255,255,0.15); color: white; backdrop-filter: blur(5px); }
body.bg-light-contrast .secondary { background: rgba(15, 23, 42, 0.12); color: #0f172a; backdrop-filter: blur(5px); font-weight: 500; }

/* CENTRAL STATION ALIGNMENT WRAPPER */
.center-stack-wrapper {
  display: flex;
  flex-direction: column;
  gap: 20px;
  width: 460px;
  z-index: 2;
}
.container { height: 100vh; display: flex; justify-content: center; align-items: center; position: relative; z-index: 2; }

/* REUSABLE MINIMALIST GLASS CARD CLASS */
.card, .front-stat {
  backdrop-filter: blur(25px);
  -webkit-backdrop-filter: blur(25px);
  border-radius: 20px;
  transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
}
body.bg-dark-contrast .card, body.bg-dark-contrast .front-stat {
  background: rgba(15, 23, 42, 0.6);
  border: 1px solid rgba(255, 255, 255, 0.15);
  box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}
body.bg-light-contrast .card, body.bg-light-contrast .front-stat {
  background: rgba(255, 255, 255, 0.75);
  border: 1px solid rgba(15, 23, 42, 0.1);
  box-shadow: 0 20px 40px rgba(15, 23, 42, 0.15);
}

.card {
  padding: 35px 40px;
  width: 100%;
  text-align: center;
}

/* MATCHING MINIMALIST FRONT DASHBOARD BADGES */
.front-dashboard { 
  display: none; /* Controlled dynamically by JavaScript */
  gap: 10px; 
  width: 100%;
}
.front-stat { 
  flex: 1; 
  padding: 14px 8px; 
  text-align: center; 
}

/* MINIMAL TEXT HIGHLIGHT ENGINE */
.front-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 4px; }
.front-value { font-size: 22px; font-weight: 800; }

body.bg-dark-contrast .front-title { opacity: 0.75; color: #ffffff; }
body.bg-light-contrast .front-title { opacity: 0.8; color: #475569; }

/* Tonal accents matching your text states */
body.bg-dark-contrast .front-stat.green .front-value { color: #34d399; text-shadow: 0 0 10px rgba(52, 211, 153, 0.2); }
body.bg-dark-contrast .front-stat.orange .front-value { color: #fbbf24; text-shadow: 0 0 10px rgba(251, 191, 36, 0.2); }
body.bg-dark-contrast .front-stat.blue .front-value { color: #60a5fa; text-shadow: 0 0 10px rgba(96, 165, 250, 0.2); }
body.bg-dark-contrast .front-stat .front-value { color: #ffffff; }

body.bg-light-contrast .front-stat.green .front-value { color: #047857; }
body.bg-light-contrast .front-stat.orange .front-value { color: #b45309; }
body.bg-light-contrast .front-stat.blue .front-value { color: #1d4ed8; }
body.bg-light-contrast .front-stat .front-value { color: #0f172a; }

input, select { width: 100%; padding: 14px; border-radius: 10px; border: none; margin-bottom: 10px; font-size: 15px; }
body.bg-dark-contrast input { background: white; color: black; }
body.bg-light-contrast input { background: #f1f5f9; color: #0f172a; border: 1px solid #cbd5e1; }
select { background: white; color: black; cursor: pointer; }
button { width: 100%; padding: 10px; border-radius: 10px; border: none; margin-top: 5px; cursor: pointer; }
.primary { background: var(--primary-color); color: white; }
body.bg-light-contrast .primary { filter: brightness(0.85); }
.popup { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: none; justify-content: center; align-items: center; z-index: 999; backdrop-filter: blur(4px); }
.popup-content { background: white; color: black; padding: 25px; border-radius: 12px; width: 90%; max-width: 950px; max-height: 85vh; overflow: auto; }
.dashboard { display: flex; gap: 10px; margin-bottom: 15px; }
.card-stat { flex: 1; background: #f1f5f9; padding: 10px; border-radius: 10px; text-align: center; }
.footer { position: fixed; bottom: 10px; width: 100%; text-align: center; font-size: 12px; letter-spacing: 0.5px; z-index: 2; transition: color 0.3s; }
body.bg-dark-contrast .footer { color: rgba(255,255,255,0.7); text-shadow: 0 1px 2px rgba(0,0,0,0.6); }
body.bg-light-contrast .footer { color: rgba(15, 23, 42, 0.8); text-shadow: none; }
.footer b { color: var(--primary-color); filter: brightness(1.2); }
body.bg-light-contrast .footer b { filter: brightness(0.8); }
.card-stat.green { background: #d1fae5; }
.card-stat.orange { background: #fde68a; }
.card-stat.blue { background: #dbeafe; }
.stat-title { font-size: 12px; color: #475569; }
.stat-value { font-size: 20px; font-weight: bold; }
table { width: 100%; border-collapse: collapse; }
td, th { padding: 10px; border-bottom: 1px solid #eee; text-align: left; }
.status-ok { color: green; }
.status-wait { color: orange; }
.simple-status { font-size: 13px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; display: inline-flex; align-items: center; gap: 8px; white-space: nowrap; }
.device-badge { font-size: 12px; font-weight: 500; padding: 4px 10px; border-radius: 6px; display: inline-flex; align-items: center; gap: 6px; }
body.bg-dark-contrast .device-badge { background: rgba(255,255,255,0.1); color: #e2e8f0; }
body.bg-light-contrast .device-badge { background: rgba(15,23,42,0.08); color: #334155; }
body.bg-dark-contrast .simple-status { text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
.status-local-dot { color: #cbd5e1; }
body.bg-light-contrast .status-local-dot { color: #475569; }
.status-live-dot { color: #10b981; }
.settings-input-group { display: flex; gap: 8px; margin-top: 10px; margin-bottom: 15px; }
.settings-input-group input, .settings-input-group select { margin: 0; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; }
.settings-input-group button { width: auto; margin: 0; padding: 10px 16px; white-space: nowrap; }
.settings-section-title { display: block; font-size: 15px; font-weight: 600; margin-top: 15px; margin-bottom: 8px; border-bottom: 1px solid #e2e8f0; padding-bottom: 3px; color: #1e293b; }
.btn-upload-setting { background: #4f46e5; color: white; width: auto; padding: 8px 16px; display: inline-block; margin-bottom: 15px; border-radius: 8px; }
.settings-table { width: 100%; margin-top: 10px; border-collapse: collapse; }
.settings-table th, .settings-table td { padding: 12px 10px; border-bottom: 1px solid #e2e8f0; }
.settings-table th { background-color: #f8fafc; font-weight: 600; font-size: 13px; color: #334155; }
.settings-table td input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; margin: 0; }
.text-center { text-align: center; }
.mini-instructions { font-size: 11px; padding: 8px 12px; border-radius: 8px; text-align: left; margin-bottom: 12px; line-height: 1.5; transition: background 0.3s, color 0.3s; }
body.bg-dark-contrast .mini-instructions { background: rgba(255, 255, 255, 0.1); color: #cbd5e1; }
body.bg-light-contrast .mini-instructions { background: rgba(15, 23, 42, 0.06); color: #475569; }
.mini-instructions span { color: var(--primary-color); filter: brightness(1.2); font-weight: bold; font-family: monospace; }
body.bg-light-contrast .mini-instructions span { filter: brightness(0.8); }
.suggestion-container { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
.suggestion-card { width: 100%; text-align: left; background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 10px; padding: 14px; cursor: pointer; transition: all 0.15s; margin-top: 0; outline: none; }
.suggestion-card:hover, .suggestion-card.focused { background: #eff6ff; border-color: var(--primary-color); transform: translateY(-1px); }
.sug-info { font-size: 15px; color: #1e293b; font-weight: 500; line-height: 1.4; }
.sug-action-tag { display: inline-block; margin-top: 8px; font-size: 11px; font-weight: bold; letter-spacing: 0.5px; color: #2563eb; text-transform: uppercase; }
.sug-checked-tag { display: inline-block; margin-top: 8px; font-size: 11px; font-weight: bold; letter-spacing: 0.5px; color: #10b981; text-transform: uppercase; }
.modal-instruction-hint { font-size: 12px; color: #64748b; margin-bottom: 15px; background: #f8fafc; padding: 8px; border-radius: 6px; border-left: 3px solid var(--primary-color); }
.modal-instruction-hint span { font-weight: bold; font-family: monospace; color: #1e3a8a; }
.picker-container { display: flex; align-items: center; justify-content: flex-start; gap: 8px; margin-bottom: 15px; width: 100%; }
.picker-container input[type="color"] { width: 44px; height: 38px; padding: 2px; border: 1px solid #cbd5e1; border-radius: 6px; cursor: pointer; margin: 0; flex-shrink: 0; }
.picker-container input[type="text"] { width: 100px; margin: 0; padding: 8px 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; font-family: monospace; text-transform: uppercase; flex-shrink: 0; height: 38px; }
.btn-bg-img-upload { background: #475569; color: white; border: none; padding: 0 14px; border-radius: 6px; font-size: 13px; cursor: pointer; font-weight: 500; height: 38px; display: inline-flex; align-items: center; white-space: nowrap; }
.btn-bg-clear { background: #ef4444; color: white; border: none; padding: 0 14px; border-radius: 6px; font-size: 13px; cursor: pointer; font-weight: 500; height: 38px; display: inline-flex; align-items: center; white-space: nowrap; }

.toast-container {
  position: fixed;
  bottom: 40px;
  right: 30px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  z-index: 10000;
  max-width: 380px;
  pointer-events: none;
}
.toast-notification {
  font-size: 13px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  padding: 4px 0;
  pointer-events: auto;
  opacity: 0;
  transform: translateY(10px);
  animation: toastFadeIn 0.2s ease-out forwards;
  display: flex;
  align-items: center;
  gap: 6px;
}
body.bg-dark-contrast .toast-notification {
  color: rgba(255, 255, 255, 0.9);
  text-shadow: 0 1px 3px rgba(0, 0, 0, 0.6);
}
body.bg-light-contrast .toast-notification {
  color: #1e293b;
  text-shadow: none;
}
.toast-notification .toast-dot { color: #10b981; font-size: 10px; }
@keyframes toastFadeIn { to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body class="bg-dark-contrast">
<div class="top-bar">
<div class="status-group">
<span id="simpleStatusText" class="simple-status status-local-dot">● Local Mode</span>
<span id="deviceStatusIdentity" class="device-badge"> 💻  Device Setup...</span>
</div>
<div class="top-bar-buttons">
<button onclick="openSettings()" class="secondary">Settings</button>
<button class="btn-view" onclick="viewMasterlist()">Masterlist</button>
</div>
</div>

<div class="container">
<div class="center-stack-wrapper">

  <!-- GLASS DASHBOARD HUD PLACED ABOVE AND MATCHING THE FORM THEME -->
  <div id="frontDashboardHud" class="front-dashboard">
    <div class="front-stat">
      <div class="front-title">Total</div>
      <div id="frontTotalVal" class="front-value">0</div>
    </div>
    <div class="front-stat green">
      <div class="front-title">Checked</div>
      <div id="frontCheckedVal" class="front-value">0</div>
    </div>
    <div class="front-stat orange">
      <div class="front-title">Pending</div>
      <div id="frontPendingVal" class="front-value">0</div>
    </div>
    <div class="front-stat blue">
      <div class="front-title">Attendance</div>
      <div id="frontRateVal" class="front-value">0%</div>
    </div>
  </div>

  <!-- CHECK IN CARD CONTEXT -->
  <div class="card">
    <h2 style="margin-top: 0; margin-bottom: 20px;">Guest Check-In</h2>
    <div class="mini-instructions">
    💡  <b>Operator Instructions:</b><br>
    • Type full/partial details & press <span>Enter</span>.<br>
    • Modal hotkeys activate automatically inside lists.
    </div>
    <form onsubmit="event.preventDefault(); checkName();" style="margin-top: 10px;">
    <input type="text" id="nameInput" placeholder="Enter guest details..." autocomplete="off">
    <button class="primary">Check</button>
    </form>
    <button class="secondary" onclick="resetForm()">Refresh</button>
  </div>

</div>
</div>

<div id="toastContainer" class="toast-container"></div>

<input type="file" id="csvFile" hidden accept=".csv, .xlsx, .xls" onchange="loadCSV(event)">
<input type="file" id="bgImageFile" hidden accept="image/*" onchange="loadCustomBackgroundImage(event)">
<div id="popup" class="popup" onclick="outside(event)">
<div class="popup-content">
<h3 id="title"></h3>
<div id="content"></div>
<div id="actions"></div>
</div>
</div>
<div class="footer">Powered by: <b>Broadimagi</b></div>
<script>
const API_URL = "https://script.google.com/macros/s/AKfycbz4gaqDwu-CKdhSTfMJG7K9kE71LFGJGax1r1bv4-zMr7F5oY0WYePMBH46eGWFl53LFA/exec";
const DEFAULT_THEME_COLOR = "#3b82f6";
let masterlist = JSON.parse(localStorage.getItem("masterlist")) || [];
let settings = JSON.parse(localStorage.getItem("settings")) || { showColumns: [], confirmColumns: [], suggestionColumns: [], notificationColumns: [], currentThemeColor: DEFAULT_THEME_COLOR };
let current = null, currentIndex = null, isLiveMode = false, deviceId = "";
let currentPopupType = "";
let cachedSuggestionsHTML = "";
let currentFocusIdx = -1;

const popupNode = document.getElementById("popup");
const titleNode = document.getElementById("title");
const contentNode = document.getElementById("content");
const actionsNode = document.getElementById("actions");
const inputNode = document.getElementById("nameInput");
const statusNode = document.getElementById("simpleStatusText");
const deviceBadgeNode = document.getElementById("deviceStatusIdentity");

window.addEventListener("DOMContentLoaded", () => {
setupDeviceIdentity();
const savedSheet = localStorage.getItem("connectedSheetUrl");
savedSheet ? fetchLiveMasterlist(savedSheet) : updateModeUI(false);
if (!settings.notificationColumns) settings.notificationColumns = [];
if (!settings.currentThemeColor) settings.currentThemeColor = DEFAULT_THEME_COLOR;
const customImg = localStorage.getItem("customThemePicture");
if (customImg) { applyImageBackground(customImg); } else { applyColorEngine(settings.currentThemeColor); }
refreshFrontDashboardCounters();
inputNode.focus();
setInterval(runBackgroundSyncHeartbeat, 15000);
});

function setupDeviceIdentity() {
let savedId = localStorage.getItem("operatorIdentityName");
if (!savedId) { savedId = "Device-" + Math.floor(1000 + Math.random() * 9000); localStorage.setItem("operatorIdentityName", savedId); }
deviceId = savedId; deviceBadgeNode.innerHTML = ` 💻  ${deviceId}`;
}
function updateDeviceIdentity(newName) {
let val = newName.trim(); if(!val) return; localStorage.setItem("operatorIdentityName", val); deviceId = val; deviceBadgeNode.innerHTML = ` 💻  ${deviceId}`;
}
function unlockOperatorIdentityField() {
if (prompt("Enter admin credentials to modify the tracking UID:") === "Broadimagi") {
const fieldNode = document.getElementById("operatorIdentityInput"); if(fieldNode) { fieldNode.removeAttribute("disabled"); fieldNode.style.backgroundColor = "white"; fieldNode.focus(); }
const unlockBtn = document.getElementById("operatorUnlockBtn"); if(unlockBtn) unlockBtn.style.display = "none";
} else { alert("Unauthorized Action: Invalid security credentials entered."); }
}
function applyColorEngine(hex) {
if (!hex || !hex.startsWith("#")) hex = DEFAULT_THEME_COLOR;
settings.currentThemeColor = hex; localStorage.setItem("settings", JSON.stringify(settings));
document.body.style.background = "";
let r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
let darkR = Math.round(r * 0.15), darkG = Math.round(g * 0.15), darkB = Math.round(b * 0.15);
let deepBaseColor = `rgb(${darkR + 8}, ${darkG + 10}, ${darkB + 18})`;
document.documentElement.style.setProperty('--primary-color', `rgb(${r}, ${g}, ${b})`);
document.documentElement.style.setProperty('--bg-gradient', `linear-gradient(135deg, ${deepBaseColor}, rgb(${Math.round(r*0.6)}, ${Math.round(g*0.6)}, ${Math.round(b*0.6)}))`);
let luminance = (0.299 * r + 0.587 * g + 0.114 * b);
document.body.classList.remove("bg-dark-contrast", "bg-light-contrast");
document.body.classList.add(luminance > 165 ? "bg-light-contrast" : "bg-dark-contrast");
}
function applyImageBackground(dataUrl) { document.body.style.background = `url(${dataUrl})`; analyzeBackgroundBrightness(dataUrl); }
function analyzeBackgroundBrightness(dataUrl) {
const img = new Image(); img.src = dataUrl;
img.onload = () => {
const canvas = document.createElement("canvas"); const ctx = canvas.getContext("2d"); canvas.width = 40; canvas.height = 40; ctx.drawImage(img, 0, 0, 40, 40);
try {
const imgData = ctx.getImageData(0, 0, 40, 40).data; let totalLuminance = 0;
for (let i = 0; i < imgData.length; i += 4) { totalLuminance += (0.299 * imgData[i] + 0.587 * imgData[i+1] + 0.114 * imgData[i+2]); }
const averageLuminance = totalLuminance / (canvas.width * canvas.height);
document.body.classList.remove("bg-dark-contrast", "bg-light-contrast");
document.body.classList.add(averageLuminance > 140 ? "bg-light-contrast" : "bg-dark-contrast");
} catch(err) { document.body.classList.add("bg-dark-contrast"); }
};
}
function handlePickerChange(val) {
if (val.length === 7 && val.startsWith("#")) {
localStorage.removeItem("customThemePicture"); applyColorEngine(val);
const textInp = document.getElementById("themeHexText"), clrInp = document.getElementById("themeHexPicker");
if(textInp) textInp.value = val; if(clrInp) clrInp.value = val;
}
}
function triggerImageUpload() { document.getElementById("bgImageFile").click(); }
function clearImageBackground() { localStorage.removeItem("customThemePicture"); applyColorEngine(settings.currentThemeColor || DEFAULT_THEME_COLOR); const clearBtn = document.getElementById("themeClearBgBtn"); if(clearBtn) clearBtn.style.display = "none"; }
function loadCustomBackgroundImage(e) {
const file = e.target.files[0]; if (!file) return;
const reader = new FileReader();
reader.onload = ev => { try { localStorage.setItem("customThemePicture", ev.target.result); applyImageBackground(ev.target.result); const clearBtn = document.getElementById("themeClearBgBtn"); if(clearBtn) clearBtn.style.display = "inline-flex"; } catch(error) { alert("Image file size too large for local cache."); } };
reader.readAsDataURL(file);
}
function updateModeUI(live) { isLiveMode = live; statusNode.innerHTML = live ? "● Live Mode" : "● Local Mode"; statusNode.className = live ? "simple-status status-live-dot" : "simple-status status-local-dot"; }
function connectSheet() {
const url = document.getElementById("sheetUrlPopupInput").value.trim(); if(!url) return disconnectSheet(true);
if(!isLiveMode && masterlist.some(x => x.Status === "Checked" || x.status === "Checked" || x.Status === "Checked-in")) {
if(confirm("Warning: You have local check-ins! Connecting will reset your view. Download backup?")) { download(); } else { return; }
}
fetchLiveMasterlist(url);
}
function disconnectSheet(bypassPrompt = false) {
if (!bypassPrompt && prompt("Enter admin password to disconnect sheet:") !== "Broadimagi") return;
localStorage.removeItem("connectedSheetUrl"); masterlist = JSON.parse(localStorage.getItem("masterlist")) || [];
settings.showColumns = []; settings.confirmColumns = []; settings.suggestionColumns = []; settings.notificationColumns = [];
localStorage.setItem("settings", JSON.stringify(settings)); updateModeUI(false); refreshFrontDashboardCounters(); openSettings();
}
async function fetchLiveMasterlist(targetUrl) {
try {
if(popupNode.style.display !== "flex") showPopup("Loading...", "Fetching structural logs...", "", "other");
const response = await fetch(`${API_URL}?sheetId=${encodeURIComponent(targetUrl)}`);
const data = await response.json();
if (data.error) { updateModeUI(false); return showPopup("Access Denied", `Google API Error: ${data.error}`, "", "other"); }
localStorage.setItem("connectedSheetUrl", targetUrl);
masterlist = data; updateModeUI(true);
if (masterlist.length > 0 && (!settings.showColumns || !settings.showColumns.length)) {
const headers = Object.keys(masterlist[0]).filter(x => x !== "rowId" && x !== "Status" && x !== "Time" && x !== "UID" && x !== "status" && x !== "time");
settings.showColumns = [...headers]; settings.confirmColumns = [...headers]; settings.suggestionColumns = [...headers]; settings.notificationColumns = [...headers];
localStorage.setItem("settings", JSON.stringify(settings));
}
refreshFrontDashboardCounters();
closePopup();
} catch (err) { updateModeUI(false); showPopup("Sync Offline", "Could not connect to database endpoint.", "", "other"); }
}

function refreshFrontDashboardCounters() {
  const hudNode = document.getElementById("frontDashboardHud");
  const tNode = document.getElementById("frontTotalVal");
  const cNode = document.getElementById("frontCheckedVal");
  const pNode = document.getElementById("frontPendingVal");
  const rNode = document.getElementById("frontRateVal");
  if(!hudNode || !tNode || !cNode || !pNode || !rNode) return;

  // Render metrics ONLY if data exists in masterlist
  if (!masterlist || masterlist.length === 0) {
    hudNode.style.display = "none";
    return;
  }

  hudNode.style.display = "flex";
  const total = masterlist.length;
  const checked = masterlist.filter(x => x.Status === "Checked" || x.status === "Checked" || x.Status === "Checked-in").length;
  const pending = total - checked;
  const rate = total > 0 ? Math.round((checked / total) * 100) : 0;

  tNode.innerText = total;
  cNode.innerText = checked;
  pNode.innerText = pending;
  rNode.innerText = rate + "%";
}

async function runBackgroundSyncHeartbeat() {
  if (!isLiveMode || currentPopupType === "suggestions" || currentPopupType === "confirmation") return;
  const currentSheetId = localStorage.getItem("connectedSheetUrl");
  if (!currentSheetId) return;

  try {
    const response = await fetch(`${API_URL}?sheetId=${encodeURIComponent(currentSheetId)}`);
    const freshData = await response.json();

    if (Array.isArray(freshData)) {
      freshData.forEach(freshRow => {
        const localMatch = masterlist.find(x => String(x.rowId) === String(freshRow.rowId));
        if (localMatch) {
          const wasCheckedLocally = localMatch.Status === "Checked" || localMatch.status === "Checked" || localMatch.Status === "Checked-in";
          const isCheckedLive = freshRow.Status === "Checked" || freshRow.status === "Checked" || freshRow.Status === "Checked-in";
          
          if (!wasCheckedLocally && isCheckedLive) {
            let activeNotificationCols = settings.notificationColumns && settings.notificationColumns.length > 0
              ? settings.notificationColumns
              : Object.keys(freshRow).filter(x => x !== "rowId" && x !== "Status" && x !== "Time" && x !== "UID" && x !== "status" && x !== "time");

            let labelString = activeNotificationCols.map(c => freshRow[c]).filter(Boolean).join(" — ");
            if (!labelString) labelString = freshRow.Name || freshRow.name || "Guest Label";

            triggerStreamToastNotification(labelString);
          }
        }
      });
      
      masterlist = freshData;
      refreshFrontDashboardCounters();
      if (currentPopupType === "masterlist") { renderMasterlistRowsHTMLOnly(); }
    }
  } catch(e) {
    console.log("Sync heartbeat idle.");
  }
}

function openFile(){ document.getElementById("csvFile").click(); }
function loadCSV(e) {
const file = e.target.files[0]; if (!file) return;
const reader = new FileReader();
reader.onload = ev => {
const rows = ev.target.result.split("\n"), headers = rows[0].split(",").map(h => h.trim());
let added = 0;
rows.slice(1).forEach(r => {
if (!r.trim()) return; let obj = {}; r.split(",").forEach((v, i) => obj[headers[i]] = v.trim()); obj.Status = ""; obj.Time = ""; obj.UID = "";
if (!masterlist.some(x => headers.every(h => x[h] === obj[h]))) { masterlist.push(obj); added++; }
});
if (!settings.showColumns || !settings.showColumns.length) { settings.showColumns = [...headers]; settings.confirmColumns = [...headers]; settings.suggestionColumns = [...headers]; settings.notificationColumns = [...headers]; }
localStorage.setItem("masterlist", JSON.stringify(masterlist)); localStorage.setItem("settings", JSON.stringify(settings));
refreshFrontDashboardCounters();
showPopup("Upload Complete", `Added: ${added}`, "", "other");
};
reader.readAsText(file);
}
function checkName(){
const val = inputNode.value.toLowerCase().trim(); if(!val) return;
let activeSearchCols = settings.suggestionColumns && settings.suggestionColumns.length > 0 ? settings.suggestionColumns : Object.keys(masterlist[0] || {}).filter(x => x !== "rowId" && x !== "Status" && x !== "Time" && x !== "UID" && x !== "status" && x !== "time");
const sug = masterlist.filter(i => activeSearchCols.some(colName => i[colName] && String(i[colName]).toLowerCase().includes(val)));
if(!sug.length) return showPopup("Not Found","No match found for configured columns.", "", "other");
sug.sort((a, b) => (activeSearchCols.some(c => String(b[c]).toLowerCase() === val) ? 1 : 0) - (activeSearchCols.some(c => String(a[c]).toLowerCase() === val) ? 1 : 0));
const displayLimit = sug.slice(0, 5); currentFocusIdx = 0;
let html = `<div class="modal-instruction-hint"> ⌨️  Suggestions Hotkeys: Use <span>↑</span> / <span>↓</span> to navigate, <span>Enter</span> to select.</div><div class="suggestion-container">` + displayLimit.map((i, index) => {
let idx = masterlist.indexOf(i), label = settings.suggestionColumns.map(c => i[c]).filter(Boolean).join(" — ");
return `<button class="suggestion-card ${index === 0 ? 'focused' : ''}" data-idx="${idx}" onclick="selectSuggestion(${idx}, true)"><div class="sug-info">${label || "Guest Info"}</div>${i.Status==="Checked"||i.status==="Checked"||i.Status==="Checked-in"?`<span class="sug-checked-tag">✓ Already Checked-In</span>`:`<span class="sug-action-tag">→ Tap to Verify & Check-In</span>`}</button>`;
}).join("") + `</div>`;
cachedSuggestionsHTML = html; showPopup("Select Guest Profile Matched", html, "", "suggestions");
}
function selectSuggestion(index, triggeredFromSuggestionsList = true){
currentIndex = index; current = masterlist[index];
let content = `<div class="modal-instruction-hint"> ⌨️  Confirmation Hotkeys: Press <span>Enter</span> to Confirm, <span>Backspace</span> to go back.</div><div style="font-size:16px; line-height:1.6; color:#334155;">` + settings.confirmColumns.map(c => `<b>${c}:</b> ${current[c] || ""}`).join("<br>") + `</div>`;
if(current.Status === "Checked" || current.status === "Checked" || current.Status === "Checked-in"){
return showPopup("<span style='color:#ef4444;'> ❌  Action Blocked</span>", `<p style="color:#ef4444; font-weight:600; margin-bottom:15px;">Already checked in!</p><b>Logged Time:</b> ${current.Time || current.time || 'No timestamp.'}<br><br>${content}`, triggeredFromSuggestionsList ? `<button onclick="goBackToSuggestions()" style="background:#64748b;color:white;">Go Back</button>` : `<button onclick="closePopup()" style="background:#64748b;color:white;">Close</button>`, "confirmation");
}
showPopup("Verify Profile Data & Confirm", content, `<button class="primary" onclick="checkIn()" style="background:#10b981; font-weight:600; padding:12px;">Confirm Check-In (Enter)</button>` + (triggeredFromSuggestionsList ? `<button onclick="goBackToSuggestions()" style="background:#64748b; color:white; margin-top:8px;">Go Back</button>` : ""), "confirmation");
}
function goBackToSuggestions() {
showPopup("Select Guest Profile Matched", cachedSuggestionsHTML, "", "suggestions");
setTimeout(() => { const cards = document.querySelectorAll(".suggestion-card"); if(cards.length > 0) { if(currentFocusIdx < 0 || currentFocusIdx >= cards.length) currentFocusIdx = 0; updateCardFocusUI(cards); } }, 10);
}

function triggerStreamToastNotification(nameString) {
  const container = document.getElementById("toastContainer"); if (!container) return;
  while (container.children.length >= 5) {
    container.removeChild(container.children[0]);
  }
  const toast = document.createElement("div"); 
  toast.className = "toast-notification"; 
  toast.innerHTML = `<span class="toast-dot">●</span> <b>${nameString}</b> checked in`;
  container.appendChild(toast); 
  setTimeout(() => { if (toast.parentNode === container) toast.remove(); }, 45000);
}

async function checkIn(){
if (currentIndex === null) return;
const time = new Date().toLocaleString(), targetGuest = masterlist[currentIndex];
if (isLiveMode) {
showPopup("Verifying...", "Checking database state...", "", "other");
try {
const currentSheetId = localStorage.getItem("connectedSheetUrl");
const verifyResponse = await fetch(`${API_URL}?sheetId=${encodeURIComponent(currentSheetId)}`);
const freshestData = await verifyResponse.json();
if (Array.isArray(freshestData)) {
masterlist = freshestData; const freshlyPolledRow = masterlist.find(x => String(x.rowId) === String(targetGuest.rowId));
if (freshlyPolledRow && (freshlyPolledRow.Status === "Checked" || freshlyPolledRow.status === "Checked" || freshlyPolledRow.Status === "Checked-in")) {
return showPopup("<span style='color:#ef4444;'> ❌  Overwrite Blocked</span>", `Collision Protected! Another operator checked this person in.<br><br>` + settings.confirmColumns.map(c => `<b>${c}:</b> ${freshlyPolledRow[c] || ""}`).join("<br>"), `<button onclick="afterCheckIn()" style="background:#64748b;color:white;">Dismiss</button>`, "other");
}
}
} catch (err) { return showPopup("Network Error", "Verification failed.", "", "other"); }
showPopup("Saving...", "Pushing updates live...", "", "other");
try {
const response = await fetch(API_URL, { method: "POST", body: JSON.stringify({ sheetId: localStorage.getItem("connectedSheetUrl"), rowId: targetGuest.rowId, status: "Checked", time: time, operator: deviceId }) });
const result = await response.json(); if(!result.success) return showPopup("Sync Refused", "Error: " + result.error, "", "other");
} catch (err) { return showPopup("Network Error", "Sync failed.", "", "other"); }
}
masterlist[currentIndex].Status = "Checked"; masterlist[currentIndex].Time = time;
if (!isLiveMode) localStorage.setItem("masterlist", JSON.stringify(masterlist));
let activeNotificationCols = settings.notificationColumns && settings.notificationColumns.length > 0 ? settings.notificationColumns : Object.keys(targetGuest).filter(x => x !== "rowId" && x !== "Status" && x !== "Time" && x !== "UID" && x !== "status" && x !== "time");
let formattedText = activeNotificationCols.map(c => targetGuest[c]).filter(Boolean).join(" — ") || targetGuest.Name || targetGuest.name || "Guest Profile";

triggerStreamToastNotification(formattedText);
refreshFrontDashboardCounters();

showPopup("Checked-In Successfully", settings.confirmColumns.map(c => `<b>${c}:</b> ${masterlist[currentIndex][c] || ""}`).join("<br>") + `<hr><b>Status:</b> Checked<br><b>Time:</b> ${time}`, `<button onclick="afterCheckIn()" style="background:#10b981;color:white;">Close</button>`, "other");
}

function openSettings(){
const savedUrl = localStorage.getItem("connectedSheetUrl") || "", hexValue = settings.currentThemeColor || DEFAULT_THEME_COLOR, hasBgImg = !!localStorage.getItem("customThemePicture");
const headers = Object.keys(masterlist[0]||{}).filter(x => x !== "Status" && x !== "Time" && x !== "UID" && x !== "status" && x !== "time" && x !== "rowId");
let hHtml = `<span class="settings-section-title">Tracking Mapping (UID)</span><div class="settings-input-group"><input type="text" id="operatorIdentityInput" value="${deviceId}" disabled style="background-color: #f1f5f9; cursor: not-allowed; font-weight: bold;"><button id="operatorUnlockBtn" onclick="unlockOperatorIdentityField()" style="background: #e11d48; color: white;"> 🔒  Unlock</button></div><span class="settings-section-title">Visual Branding Color Engine</span><div class="picker-container"><input type="color" id="themeHexPicker" value="${hexValue}" oninput="handlePickerChange(this.value)"><input type="text" id="themeHexText" value="${hexValue}" maxlength="7" oninput="handlePickerChange(this.value)"><button class="btn-bg-img-upload" onclick="triggerImageUpload()"> 🖼️  Wallpaper</button><button id="themeClearBgBtn" class="btn-bg-clear" onclick="clearImageBackground()" style="display: ${hasBgImg ? 'inline-flex' : 'none'};"> ❌  Clear</button></div><span class="settings-section-title">Database Integration Link</span><div class="settings-input-group"><input type="text" id="sheetUrlPopupInput" value="${savedUrl}" placeholder="Paste URL..."><button onclick="connectSheet()" class="primary" style="background:#4f46e5;">Link Sheet</button>${savedUrl ? `<button onclick="disconnectSheet()" style="background:#ef4444; color:white;">Unlink</button>` : ''}</div>`;
if (!isLiveMode) hHtml += `<span class="settings-section-title">Local Document Import</span><button class="btn-upload-setting" onclick="openFile()">Upload Local File</button>`;
hHtml += `<span class="settings-section-title">Presentation Rules Matrix</span><table class="settings-table"><thead><tr><th>Column Name</th><th class="text-center">Masterlist</th><th class="text-center">Suggestions</th><th class="text-center">Confirmation</th><th class="text-center">Notifications</th></tr></thead><tbody>`;
if (headers.length === 0) { hHtml += `<tr><td colspan="5" style="text-align: center; color: #64748b; padding: 20px;"><i>No database columns loaded.</i></td></tr>`; } else {
headers.forEach(h => { hHtml += `<tr><td><b>${h}</b></td><td class="text-center"><input type="checkbox" ${settings.showColumns.includes(h)?"checked":""} onchange="toggleGridSetting('showColumns', '${h}', this.checked)"></td><td class="text-center"><input type="checkbox" ${settings.suggestionColumns.includes(h)?"checked":""} onchange="toggleGridSetting('suggestionColumns', '${h}', this.checked)"></td><td class="text-center"><input type="checkbox" ${settings.confirmColumns.includes(h)?"checked":""} onchange="toggleGridSetting('confirmColumns', '${h}', this.checked)"></td><td class="text-center"><input type="checkbox" ${(settings.notificationColumns && settings.notificationColumns.includes(h))?"checked":""} onchange="toggleGridSetting('notificationColumns', '${h}', this.checked)"></td></tr>`; });
}
hHtml += `</tbody></table>`; showPopup("System Configuration", hHtml, "", "other");
}
function toggleGridSetting(type, field, isChecked) { if (!settings[type]) settings[type] = []; if (isChecked) { if (!settings[type].includes(field)) settings[type].push(field); } else { settings[type] = settings[type].filter(x => x !== field); } localStorage.setItem("settings", JSON.stringify(settings)); }

function viewMasterlist(){
if (!masterlist.length) return showPopup("No Data","No uploaded records mapped.", "", "other");
showPopup("Masterlist", `<div id="masterlistContainer"></div>`, "", "masterlist");
renderMasterlistRowsHTMLOnly();
}

function renderMasterlistRowsHTMLOnly() {
const targetBox = document.getElementById("masterlistContainer"); if(!targetBox) return;
const total = masterlist.length, checked = masterlist.filter(x => x.Status === "Checked" || x.status === "Checked" || x.Status === "Checked-in").length, pending = total - checked;
const rate = total > 0 ? Math.round((checked / total) * 100) : 0;
let headers = settings.showColumns.length ? settings.showColumns : Object.keys(masterlist[0]).filter(x => x !== "Status" && x !== "Time" && x !== "UID" && x !== "status" && x !== "time" && x !== "rowId");
let headerRow = headers.map(h => `<th>${h}</th>`).join("") + `<th>Status</th>`;
let rows = masterlist.map(item => {
let isCh = item.Status === "Checked" || item.status === "Checked" || item.Status === "Checked-in";
return `<tr>${headers.map(h => `<td>${item[h] || ""}</td>`).join("")}<td>${isCh ? `<span class="status-ok">Checked (${item.Time || item.time || ''})</span>` : `<span class="status-wait">Pending</span>`}</td></tr>`;
}).join("");
let buttons = isLiveMode ? `<div style="margin-top:15px;text-align:center;"><p style="font-size:12px; color:#64748b;">🔄 Auto-refreshing every 15 seconds...</p></div>` : `<div style="margin-top:15px;text-align:center;"><button onclick="download()">Download</button></div><div style="margin-top:10px;text-align:center;"><button onclick="resetAll()" style="background:#7c3aed;color:white;">Clear All Status</button></div><div style="margin-top:10px;text-align:center;"><button onclick="clearAllData()" style="background:#ef4444;color:white;">Clear All Uploaded Data</button></div>`;
targetBox.innerHTML = `<div class="dashboard"><div class="card-stat"><div class="stat-title">Total</div><div class="stat-value">${total}</div></div><div class="card-stat green"><div class="stat-title">Checked</div><div class="stat-value">${checked}</div></div><div class="card-stat orange"><div class="stat-title">Pending</div><div class="stat-value">${pending}</div></div><div class="card-stat blue"><div class="stat-title">Attendance</div><div class="stat-value">${rate}%</div></div></div><table><tr>${headerRow}</tr>${rows}</table>${buttons}`;
}

function download() {
if (masterlist.length === 0) return;
let csv = Object.keys(masterlist[0]).join(",") + "\n"; masterlist.forEach(item => { csv += Object.values(item).join(",") + "\n"; });
const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([csv])); a.download = "local_attendance_backup.csv"; a.click();
}
function resetAll() {
if(isLiveMode || prompt("Enter admin password:") !== "Broadimagi") return;
masterlist.forEach(item => { item.Status = ""; item.Time = ""; item.UID = ""; if(item.status)item.status=""; if(item.time)item.time=""; });
localStorage.setItem("masterlist", JSON.stringify(masterlist)); refreshFrontDashboardCounters(); viewMasterlist();
}
function clearAllData() {
if(isLiveMode || prompt("Enter admin password:") !== "Broadimagi" || !confirm("Download first?")) return;
download(); setTimeout(() => { if (!confirm("Delete ALL data?")) return; masterlist = []; localStorage.removeItem("masterlist"); refreshFrontDashboardCounters(); closePopup(); }, 500);
}
function updateCardFocusUI(cards) { cards.forEach((card, idx) => { if (idx === currentFocusIdx) { card.classList.add("focused"); card.scrollIntoView({ block: "nearest" }); } else { card.classList.remove("focused"); } }); }
function afterCheckIn(){ closePopup(); inputNode.value = ""; inputNode.focus(); }
function showPopup(t, c, a = "", type = "other"){ titleNode.innerHTML = t; contentNode.innerHTML = c; actionsNode.innerHTML = a; currentPopupType = type; popupNode.style.display = "flex"; }
function closePopup(){ popupNode.style.display = "none"; currentPopupType = ""; inputNode.focus(); }
function outside(e){ if(e.target.id === "popup") closePopup(); }
function resetForm(){ inputNode.value = ""; inputNode.focus(); }
document.addEventListener("keydown", e => {
  if (popupNode.style.display !== "flex") return;
  if (currentPopupType === "suggestions") {
    const cards = document.querySelectorAll(".suggestion-card");
    if (e.key === "Backspace") { e.preventDefault(); closePopup(); }
    else if (e.key === "ArrowDown" && cards.length > 0) { e.preventDefault(); currentFocusIdx = (currentFocusIdx + 1) % cards.length; updateCardFocusUI(cards); }
    else if (e.key === "ArrowUp" && cards.length > 0) { e.preventDefault(); currentFocusIdx = (currentFocusIdx - 1 + cards.length) % cards.length; updateCardFocusUI(cards); }
    else if (e.key === "Enter" && cards.length > 0) { e.preventDefault(); const active = cards[currentFocusIdx]; if (active) active.click(); }
  }
  else if (currentPopupType === "confirmation") {
    if (e.key === "Backspace") { e.preventDefault(); cachedSuggestionsHTML ? goBackToSuggestions() : closePopup(); }
    else if (e.key === "Enter") { e.preventDefault(); const btn = actionsNode.querySelector("button"); if (btn) btn.click(); }
  }
  else { if (e.key === "Enter" || e.key === "Backspace") { if(document.activeElement.tagName === "INPUT" || document.activeElement.tagName === "SELECT") return; const btn = actionsNode.querySelector("button"); if (btn) { e.preventDefault(); btn.click(); } else { closePopup(); } } }
  if (e.key === "Escape") closePopup();
});
</script>
